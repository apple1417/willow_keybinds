name: CI

on: [push, pull_request, workflow_dispatch]

jobs:
  spelling:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Check spelling
      uses: crate-ci/typos@master

  pyright:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        path: keybinds

    - name: Checkout mods_base
      uses: actions/checkout@v6
      with:
        repository: bl-sdk/mods_base
        path: mods_base

    - name: Checkout pyunrealsdk
      uses: actions/checkout@v6
      with:
        repository: bl-sdk/pyunrealsdk
        path: .pyunrealsdk
        submodules: recursive

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: ">=3.13"

    - name: Generate stubs
      run: |
        cd .pyunrealsdk
        pip install -r stubgen/requirements.txt
        python -m stubgen WILLOW ../.stubs
        cd ..
        rm -r .pyunrealsdk
        sed -i 's/# CI ADD STUB PATH HERE/stubPath = "..\/.stubs"\nextraPaths = ["..\/"]\nreportMissingModuleSource = false/' keybinds/pyproject.toml

    - name: Run pyright
      uses: jakebailey/pyright-action@v3
      with:
        working-directory: ${{ github.workspace }}/keybinds/

  ruff:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        path: keybinds

    - name: Checkout mods_base
      uses: actions/checkout@v6
      with:
        repository: bl-sdk/mods_base
        path: mods_base

    - name: Checkout pyunrealsdk
      uses: actions/checkout@v6
      with:
        repository: bl-sdk/pyunrealsdk
        path: .pyunrealsdk
        submodules: recursive

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: ">=3.13"

    - name: Generate stubs
      run: |
        cd .pyunrealsdk
        pip install -r stubgen/requirements.txt
        python -m stubgen WILLOW ../.stubs
        cd ..
        rm -r .pyunrealsdk
        sed -i 's/# CI ADD STUB PATH HERE/stubPath = "..\/.stubs"\nextraPaths = ["..\/"]\nreportMissingModuleSource = false/' keybinds/pyproject.toml

    - name: Run Ruff Linting
      uses: astral-sh/ruff-action@v4.0.0
      with:
        src: keybinds/

    - name: Run Ruff Formatting
      uses: astral-sh/ruff-action@v4.0.0
      with:
        src: keybinds/
        args: format --check
